---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: gpu-platform
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          args: ["-config.file=/etc/loki/local-config.yaml"]
          ports: [{containerPort: 3100}]
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: gpu-platform
  labels: {app: loki}
spec:
  selector: {app: loki}
  ports: [{port: 3100, targetPort: 3100}]
