---
# GPU compatibility matrix — the "source of truth" for what configs are valid
apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-compatibility-matrix
  namespace: gpu-platform
  labels:
    app: gpu-platform
    component: config
data:
  compatibility.json: |
    {
      "nvidia-a10g": {
        "architecture": "ampere",
        "compute_capability": "8.6",
        "memory_gb": 24,
        "supported_kv_cache_dtypes": ["fp16", "bf16", "auto"],
        "fp8_supported": false,
        "max_tensor_parallel": 1
      },
      "nvidia-a100-40g": {
        "architecture": "ampere",
        "compute_capability": "8.0",
        "memory_gb": 40,
        "supported_kv_cache_dtypes": ["fp16", "bf16", "auto"],
        "fp8_supported": false,
        "max_tensor_parallel": 8
      },
      "nvidia-a100-80g": {
        "architecture": "ampere",
        "compute_capability": "8.0",
        "memory_gb": 80,
        "supported_kv_cache_dtypes": ["fp16", "bf16", "auto"],
        "fp8_supported": false,
        "max_tensor_parallel": 8
      },
      "nvidia-h100": {
        "architecture": "hopper",
        "compute_capability": "9.0",
        "memory_gb": 80,
        "supported_kv_cache_dtypes": ["fp16", "bf16", "fp8", "auto"],
        "fp8_supported": true,
        "max_tensor_parallel": 8
      }
    }
---
# Platform changelog — shows recent releases
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-changelog
  namespace: gpu-platform
  labels:
    app: gpu-platform
    component: config
data:
  changelog.txt: |
    2026-04-12 22:15 - model-deployer v2.4.1
      - Added fp8 quantization parameter passthrough for vLLM
      - NOTE: GPU compatibility validation for fp8 not yet implemented
      - Fixed model download retry logic

    2026-04-10 14:00 - proxy-gateway v3.1.0
      - Added rate limiting per customer tier
      - Updated vllm-openai base image to 0.6.5-rc1

    2026-04-08 10:30 - auth-service v1.8.2
      - Added enterprise tier rate limits
      - Fixed token refresh edge case
